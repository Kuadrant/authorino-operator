name: Build images for main branch

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Calls build-images-base workflow
    uses: ./.github/workflows/build-images-base.yaml
    secrets: inherit
    with:
      operatorVersion: ${{ github.sha }}
      operatorTag: ${{ github.sha }}
      authorinoVersion: latest
