name: Release operator

on:
  workflow_dispatch:
    inputs:
      gitRef:
        description: Commit SHA or branch name
        required: true
      operatorVersion:
        description: Operator version
        required: true
      authorinoVersion:
        description: Authorino version
        required: true
        default: latest
      prerelease:
        description: Is the release a prerelease
        required: false
        type: boolean
      channels:
        description: Bundle and catalog channels, comma separated
        default: stable
        type: string

jobs:
  build:
    name: Release operator
    runs-on: ubuntu-latest
    steps:
      - name: Validate version input
        run: |
          version="${{ github.event.inputs.operatorVersion }}"
          if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([+-].+)?$'; then
            echo "Error: version must be semver format (e.g., 0.24.1, 0.25.0-rc1)"
            exit 1
          fi
      - name: Install gettext-base
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base
      - name: Checkout code at git ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.gitRef }}
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
        id: go
      - name: Derive release branch name
        id: release-branch
        run: |
          # Extract major.minor from version (e.g., 0.24.1 → 0.24)
          # Removes: pre-release suffix ([+-].*) and patch version (\.[0-9]*$)
          release_branch=release-$(echo "${{ github.event.inputs.operatorVersion }}" | sed 's/[+-].*//; s/\.[0-9]*$//')
          echo "name=$release_branch" >> $GITHUB_OUTPUT
      - name: Create release branch
        if: ${{ !startsWith(github.event.inputs.gitRef, 'release-') }}
        run: |
          git checkout -b ${{ steps.release-branch.outputs.name }}
      - name: Prepare release
        run: |
          VERSION=${{ github.event.inputs.operatorVersion }} \
          AUTHORINO_VERSION=${{ github.event.inputs.authorinoVersion }} \
          CHANNELS=${{ github.event.inputs.channels }} \
          DEFAULT_CHANNEL=stable \
          make prepare-release
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A && git commit -m "Prepared release v${{ github.event.inputs.operatorVersion }}"
          git push origin ${{ steps.release-branch.outputs.name }}
      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # ratchet:softprops/action-gh-release@v2
        with:
          name: v${{ github.event.inputs.operatorVersion }}
          tag_name: v${{ github.event.inputs.operatorVersion }}
          body: "**This release enables installations of Authorino v${{ github.event.inputs.authorinoVersion }}**"
          generate_release_notes: true
          target_commitish: ${{ steps.release-branch.outputs.name }}
          prerelease: ${{ github.event.inputs.prerelease }}
          token: ${{ secrets.KUADRANT_DEV_PAT }}
